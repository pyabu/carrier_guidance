{% extends "base.html" %}
{% block title %}Sign Up - CareerPath Pro{% endblock %}

{% block content %}
<section class="page-header">
    <div class="header-overlay"></div>
    <div class="container" style="position:relative; z-index:2;">
        <h1><i class="fas fa-user-plus text-accent"></i> Create an Account</h1>
    </div>
</section>

<section class="section" style="padding: 60px 0; background: var(--bg-secondary);">
    <div class="container"
        style="max-width: 450px; margin: 0 auto; background: var(--surface); padding: 40px; border-radius: 16px; box-shadow: var(--shadow-md);">

        {% if error %}
        <div
            style="background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-primary);">Full
                    Name</label>
                <input type="text" name="name" class="form-control" required placeholder="John Doe"
                    style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px;">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-primary);">Email
                    Address</label>
                <input type="email" name="email" class="form-control" required placeholder="you@example.com"
                    style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px;">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label
                    style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-primary);">Password</label>
                <input type="password" name="password" class="form-control" required minlength="6"
                    placeholder="At least 6 characters"
                    style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px;">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width:100%; padding:14px; font-size:1.1rem; border-radius:8px;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
            Already have an account? <a href="/login" style="color: var(--accent); font-weight: 600;">Log in</a>
        </p>
    </div>
</section>
{% endblock %}
